name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: scop/common/force-color@main
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo build --release --target wasm32-unknown-unknown
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: target/wasm32-unknown-unknown/release/dprint_plugin_shebang.wasm

  github:
    name: GitHub
    runs-on: ubuntu-latest
    permissions:
      contents: write # for creating releases
    needs: build
    steps:
      - uses: scop/common/force-color@main
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Sanity check tag vs version
        run: grep -xF "version = \"$GITHUB_REF_NAME\"" Cargo.toml
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/
      - run: ln -s dprint_plugin_shebang.wasm dist/plugin.wasm
      - run: gh release create --generate-notes "$GITHUB_REF_NAME" dist/plugin.wasm
        env:
          GH_TOKEN: ${{ github.token }}
