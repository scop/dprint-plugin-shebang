name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  code:
    name: Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: scop/common/force-color@08f8a44771add9537499e9325dca0fe1479c2480 # main
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: cargo --verbose test
