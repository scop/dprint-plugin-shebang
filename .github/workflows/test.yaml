name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  code:
    name: Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: scop/common/force-color@main
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: cargo --verbose test
